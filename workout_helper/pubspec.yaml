name: cathlete
description: A new Flutter project.

environment:
  sdk: '^3.9.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.2+1
  google_mlkit_pose_detection: ^0.14.0
  permission_handler: ^12.0.1
  audioplayers: ^6.5.1
  provider: ^6.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - lib/assets/correct.m4a
    - lib/assets/incorrect.mp3

dev_dependencies:
  flutter_launcher_icons: '^0.13.1'

flutter_launcher_icons:
  android: true
  ios: true

  image_path: 'assets/images/app_icon2.png'

  #adaptive_icon_background: '#FF8A3D'
  #adaptive_icon_foreground: 'assets/images/app_icon.png'

  remove_alpha_ios: true




